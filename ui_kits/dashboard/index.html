<!DOCTYPE html>
<!-- @dsCard group="UI Kit — Dashboard" name="Dashboard UI Kit" subtitle="Agent-ops dashboard — KPIs, runs, live trace" viewport="1280x720" -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Newtuple — Dashboard UI Kit</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin:0; height:100%; }
  body { font-family:'Inter',sans-serif; background:var(--gray-50); -webkit-font-smoothing:antialiased; }
  #root { height:100vh; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="Shell.jsx"></script>
<script type="text/babel" src="Dashboard.jsx"></script>
<script type="text/babel">
function App(){
  const [active,setActive]=React.useState('Overview');
  React.useEffect(()=>{ if(window.lucide) window.lucide.createIcons(); });
  return (
    <div style={{ display:'flex', height:'100vh' }}>
      <Sidebar active={active} setActive={setActive} />
      <div style={{ flex:1, display:'flex', flexDirection:'column', minWidth:0 }}>
        <Topbar title={active} />
        <main style={{ flex:1, overflow:'auto', padding:28, display:'flex', flexDirection:'column', gap:20 }}>
          <div style={{ display:'flex', gap:18 }}>
            <Kpi label="Active agents" value="24" delta="+3" icon="bot" />
            <Kpi label="Runs / 24h" value="8,412" delta="+12%" icon="activity" />
            <Kpi label="Avg accuracy" value="94.1%" delta="+1.8%" icon="gauge" />
            <Kpi label="Avg latency" value="1.9s" delta="-0.3s" icon="zap" />
          </div>
          <div style={{ display:'flex', gap:20, alignItems:'flex-start' }}>
            <RunsTable />
            <TracePanel />
          </div>
        </main>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
