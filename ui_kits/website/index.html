<!DOCTYPE html>
<!-- @dsCard group="UI Kit — Website" name="Website UI Kit" subtitle="Marketing site — hero, services, cases, FAQ, footer" viewport="1280x720" -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Newtuple — Website UI Kit</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body { font-family: 'Inter', sans-serif; background: #fff; -webkit-font-smoothing: antialiased; }
  a { transition: color .3s; }
  .cta-band { background: var(--cobalt); color:#fff; padding: 88px 32px; text-align:center; position:relative; overflow:hidden; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="Nav.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="Services.jsx"></script>
<script type="text/babel" src="CaseStudies.jsx"></script>
<script type="text/babel" src="Social.jsx"></script>
<script type="text/babel" src="FAQFooter.jsx"></script>

<script type="text/babel">
function CtaBand() {
  useLucide();
  return (
    <div className="cta-band">
      <div style={{ position:'relative', zIndex:1, maxWidth: 720, margin:'0 auto' }}>
        <h2 style={{ margin:0, fontWeight:200, fontSize:44, lineHeight:1.12, letterSpacing:'-0.02em' }}>
          Ready to build your agentic enterprise?
        </h2>
        <p style={{ margin:'18px auto 32px', fontWeight:300, fontSize:18, color:'rgba(255,255,255,.82)', maxWidth:520 }}>
          Talk to the team that takes AI all the way to production.
        </p>
        <div style={{ display:'flex', gap:14, justifyContent:'center' }}>
          <button style={{ fontFamily:'Inter', fontWeight:500, fontSize:15, border:'none', cursor:'pointer', background:'#fff', color:'#0047AB', padding:'14px 28px', borderRadius:9999, display:'inline-flex', gap:8, alignItems:'center' }}>
            Talk to Our Experts <i data-lucide="arrow-right" style={{ width:16, height:16 }}></i>
          </button>
        </div>
      </div>
    </div>
  );
}

function App() {
  React.useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, []);
  return (
    <React.Fragment>
      <Hero />
      <Services />
      <CaseStudies />
      <Clients />
      <Testimonials />
      <FAQ />
      <CtaBand />
      <Footer />
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
