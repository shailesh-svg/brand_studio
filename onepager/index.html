<!doctype html>
<!-- @dsCard group="Brand" name="One-pager" subtitle="A4 portrait, hub-and-spoke architecture" viewport="1240x1754" -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Newtuple · AI Engineering Capability</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="colors_and_type.css">

<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #E8EAEE;
    min-height: 100vh;
    color: var(--fg-1);
  }
  /* Viewport stage. letterboxes the fixed-size page on the gray field */
  .stage {
    position: relative;
    width: 100%;
    min-width: 1240px;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 32px 0 80px;
  }
  /* The actual page. fixed A4 portrait at 150 DPI */
  .page {
    width: 1240px;
    height: 1754px;
    flex: 0 0 1240px;
    background: #fff;
    transform-origin: top center;
    box-shadow: 0 20px 60px rgba(14,19,32,0.10), 0 2px 8px rgba(14,19,32,0.04);
    position: relative;
    overflow: hidden;
  }
  /* Print: undo scaling, exact page */
  @media print {
    @page { size: A4 portrait; margin: 0; }
    html, body { background: #fff; }
    .stage { padding: 0; }
    .page { transform: none !important; box-shadow: none; width: 210mm; height: 297mm; }
  }

  /* ===== PAGE LAYOUT. A4 portrait at 1240×1754 ===== */
  :root {
    --ac-cobalt: #0047AB;
    --ac-cobalt-dark: #003582;
    --ac-cobalt-soft: #E2EBF7;
  }

  .page {
    display: flex;
    flex-direction: column;
    color: var(--fg-1);
  }

  /* ── Header ───────────────────────────────────────── */
  .op-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 36px 64px 0;
  }
  .op-wordmark {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    color: var(--ac-cobalt);
    font-size: 24px;
    letter-spacing: 4px;
  }
  .op-eyebrow {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--gray-500);
    text-transform: uppercase;
    white-space: nowrap;
  }

  /* ── Hero ─────────────────────────────────────────── */
  .op-hero {
    padding: 28px 64px 12px;
  }
  .op-hero__h1 {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 44px;
    line-height: 1.15;
    letter-spacing: -0.015em;
    color: var(--gray-900);
    margin: 0;
  }
  .op-hero__h1--mute {
    font-weight: 200;
    color: var(--gray-700);
  }

  /* ── Positioning strip ────────────────────────────── */
  .op-posit {
    margin: 14px 64px 0;
    padding: 22px 28px;
    background: var(--gray-50);
    border-left: 3px solid var(--ac-cobalt);
    display: grid;
    grid-template-columns: 140px 1fr;
    gap: 24px;
    align-items: start;
  }
  .op-posit__label {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--ac-cobalt);
    text-transform: uppercase;
    padding-top: 4px;
  }
  .op-posit__body {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 14px;
    line-height: 1.65;
    color: var(--gray-700);
  }
  .op-posit__body strong {
    font-weight: 600;
    color: var(--gray-900);
  }

  /* ── Section header (shared) ──────────────────────── */
  .op-section-head {
    display: flex;
    align-items: baseline;
    gap: 28px;
    margin-bottom: 18px;
  }
  .op-section-head__label {
    flex: 0 0 auto;
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--ac-cobalt);
    text-transform: uppercase;
    padding: 6px 0 8px;
    border-bottom: 2px solid var(--ac-cobalt);
    white-space: nowrap;
  }
  .op-section-head__sub {
    flex: 1 1 auto;
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 13px;
    line-height: 1.6;
    color: var(--gray-600);
  }
  .op-section-head--onDark .op-section-head__label {
    color: #fff;
    border-bottom-color: rgba(255,255,255,0.5);
  }
  .op-section-head--onDark .op-section-head__sub {
    color: rgba(255,255,255,0.72);
  }

  /* ── Architecture section ─────────────────────────── */
  .op-arch {
    padding: 28px 40px 16px;
  }
  .arch-wrap {
    display: flex;
    justify-content: center;
  }

  /* Cards (shared) */
  .arch-card {
    background: #fff;
    border: 1px solid var(--gray-200);
    border-radius: 10px;
    padding: 14px 18px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 4px;
  }
  .arch-card__label {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 14px;
    color: var(--gray-900);
    letter-spacing: -0.005em;
    margin-bottom: 2px;
  }
  .arch-card__label--accent {
    color: var(--ac-cobalt);
  }
  .arch-card__item {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 12px;
    line-height: 1.45;
    color: var(--gray-600);
  }
  .arch-card__item--lg {
    font-size: 13px;
    color: var(--gray-700);
  }
  .arch-card__item--muted {
    font-size: 11px;
    color: var(--gray-500);
    letter-spacing: 0.04em;
  }
  .arch-card__item--tight {
    font-size: 11.5px;
    line-height: 1.4;
  }
  .arch-card__item--onDark {
    color: rgba(255,255,255,0.85);
    font-size: 12px;
  }

  .arch-card--input {
    background: #FAFBFC;
  }
  .arch-card--review {
    background: #fff;
    border-color: var(--ac-cobalt-soft);
  }

  /* Hub */
  .arch-card--hub {
    color: #fff;
    border: none;
    padding: 26px 28px;
    gap: 0;
    justify-content: flex-start;
    box-shadow: 0 18px 36px rgba(0,71,171,0.18);
  }
  .arch-card__eyebrow {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.6);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .arch-card__eyebrow--light {
    color: rgba(255,255,255,0.7);
    margin-bottom: 4px;
  }
  .arch-card__title {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 22px;
    line-height: 1.2;
    color: #fff;
    letter-spacing: -0.01em;
  }
  .arch-hub__divider {
    height: 1px;
    background: rgba(255,255,255,0.2);
    margin: 16px 0 14px;
  }
  .arch-hub__row {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 12.5px;
    line-height: 1.85;
    color: rgba(255,255,255,0.9);
  }

  /* Output strip */
  .arch-card--output {
    color: #fff;
    border: none;
    padding: 12px 18px;
    gap: 2px;
    justify-content: center;
  }

  /* Right column. outcome cards */
  .arch-card--outcome {
    flex-direction: row;
    gap: 12px;
    align-items: center;
    padding: 10px 14px;
  }
  .arch-card__num {
    flex: 0 0 auto;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 1.5px;
    color: var(--ac-cobalt);
    background: var(--ac-cobalt-soft);
    border-radius: 4px;
    padding: 4px 7px;
    line-height: 1;
  }
  .arch-outcome__body {
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 0;
  }
  .arch-card__heading {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 12.5px;
    color: var(--gray-900);
    line-height: 1.2;
  }

  /* ── Problems + Proof split band ───────────────────── */
  .op-split {
    margin: 4px 40px 0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    align-items: stretch;
  }
  .op-split__left {
    padding: 26px 28px 28px;
    background: #FAFBFC;
    border: 1px solid var(--gray-200);
    border-right: none;
  }
  .op-split__right {
    padding: 26px 28px 28px;
    background: var(--ac-cobalt-dark);
    color: #fff;
  }
  .op-split__intro {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 12px;
    line-height: 1.55;
    color: var(--gray-600);
    margin: 10px 0 18px;
    max-width: 480px;
  }
  .op-split__intro--onDark {
    color: rgba(255,255,255,0.72);
  }

  /* Problems list */
  .op-problems__list {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .op-problems__item {
    display: grid;
    grid-template-columns: 28px 1fr;
    gap: 12px;
    align-items: start;
    padding-top: 12px;
    border-top: 1px solid var(--gray-200);
  }
  .op-problems__item:first-child {
    border-top: none;
    padding-top: 2px;
  }
  .op-problems__n {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 1.5px;
    color: var(--ac-cobalt);
    padding-top: 3px;
  }
  .op-problems__title {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 13px;
    line-height: 1.3;
    color: var(--gray-900);
    margin-bottom: 4px;
  }
  .op-problems__copy {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 11px;
    line-height: 1.55;
    color: var(--gray-600);
  }

  /* Proof grid (3×2 inside the right half) */
  .op-proof__grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    column-gap: 16px;
    row-gap: 18px;
  }
  .op-proof__tile {
    padding: 0;
    border-left: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .op-proof__tile:first-child { padding-left: 0; }
  .op-proof__value {
    font-family: 'Inter', sans-serif;
    font-weight: 200;
    font-size: 38px;
    line-height: 1;
    letter-spacing: -0.02em;
    color: #fff;
  }
  .op-proof__unit {
    font-size: 15px;
    font-weight: 400;
    letter-spacing: 0;
    color: rgba(255,255,255,0.7);
  }
  .op-proof__label {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 12px;
    color: #fff;
    line-height: 1.3;
    margin-top: 2px;
  }
  .op-proof__ctx {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 10px;
    line-height: 1.45;
    color: rgba(255,255,255,0.68);
  }

  /* ── Engagement model ───────────────────────────── */
  .op-engage {
    padding: 24px 64px 12px;
  }
  .op-engage__grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
  }
  .op-engage__tile {
    padding: 6px 22px 6px 22px;
    border-left: 1px solid var(--gray-200);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .op-engage__tile:first-child {
    border-left: none;
    padding-left: 0;
  }
  .op-engage__head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 2px;
  }
  .op-engage__n {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 12px;
    color: var(--ac-cobalt);
    letter-spacing: 2px;
  }
  .op-engage__wk {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--gray-500);
    white-space: nowrap;
  }
  .op-engage__title {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 18px;
    color: var(--gray-900);
    letter-spacing: -0.01em;
    line-height: 1.15;
  }
  .op-engage__body {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 11.5px;
    line-height: 1.55;
    color: var(--gray-600);
  }

  /* ── Footer ───────────────────────────────────────── */
  .op-footer {
    margin-top: auto;
    padding: 20px 64px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .op-footer__brand {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 11px;
    color: var(--ac-cobalt);
    letter-spacing: 2.5px;
  }
  .op-footer__contact {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 11px;
    color: var(--gray-500);
    letter-spacing: 0.5px;
  }
</style>
</head>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel" src="App.jsx"></script>

<script>
  // Scale-to-fit the .page to the viewport width while keeping its native size
  function fit() {
    const page = document.querySelector('.page');
    if (!page) return;
    // Honor the exporter's noscale signal — gen_pptx sets this so the slide
    // is captured at native size, not at the viewport-fit scale.
    if (page.hasAttribute('noscale') || page.hasAttribute('data-noscale')) {
      page.style.transform = 'none';
      const stage = document.querySelector('.stage');
      if (stage) stage.style.minHeight = '1754px';
      return;
    }
    const margin = 64; // breathing room
    const availW = window.innerWidth - margin;
    const availH = window.innerHeight - margin;
    const scale = Math.min(availW / 1240, availH / 1754, 1);
    page.style.transform = `scale(${scale})`;
    // Keep stage tall enough so the scaled page is fully visible
    const stage = document.querySelector('.stage');
    if (stage) stage.style.minHeight = `${1754 * scale + 96}px`;
  }
  window.addEventListener('resize', fit);
  // Re-fit after React renders + tweaks panel mounts
  const obs = new MutationObserver(() => fit());
  obs.observe(document.body, { childList: true, subtree: true });
  requestAnimationFrame(() => { fit(); setTimeout(fit, 50); setTimeout(fit, 200); });
</script>
