<!DOCTYPE html>
<!-- @dsCard group="Components" name="Form Fields" subtitle="Default + cobalt focus ring" viewport="700x180" --><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_card.css">
<style>
  .fld{display:flex;flex-direction:column;gap:7px;flex:1;}
  .lbl{font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:var(--gray-500);}
  .inp{font-family:var(--font-sans);font-size:15px;font-weight:300;color:var(--fg-1);background:#fff;border:1px solid var(--border-strong);border-radius:12px;padding:13px 15px;outline:none;transition:border-color .3s,box-shadow .3s;}
  .inp::placeholder{color:var(--gray-400);}
  .inp.focus{border-color:var(--cobalt);box-shadow:0 0 0 3px rgba(0,71,171,.14);}
  .hint{font-size:12px;color:var(--gray-400);font-weight:300;}
</style>
</head><body>
<div class="card" style="gap:18px;">
  <div class="cap">Form fields</div>
  <div class="row" style="gap:18px;align-items:flex-start;">
    <div class="fld"><span class="lbl">Work email</span><input class="inp" placeholder="you@company.com"><span class="hint">Default · gray-300 border</span></div>
    <div class="fld"><span class="lbl">Company</span><input class="inp focus" value="Newtuple"><span class="hint">Focus · cobalt ring</span></div>
  </div>
</div>
</body></html>
