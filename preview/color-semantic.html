<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Semantic Color" subtitle="Success / highlight / warning / error" viewport="700x190" --><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_card.css">
<style>
  .sw{display:flex;flex-direction:column;gap:8px;flex:1;}
  .chip{height:56px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;}
  .nm{font-size:12px;font-weight:500;color:var(--fg-1);}
  .hx{font-family:var(--font-mono);font-size:10px;color:var(--gray-400);}
</style>
</head><body>
<div class="card" style="gap:14px;">
  <div class="cap">Functional / semantic</div>
  <div class="row" style="gap:14px;">
    <div class="sw"><div class="chip" style="background:#E6F6EF;color:#1FA971;">Success</div><div class="nm">Green 500</div><div class="hx">#1FA971</div></div>
    <div class="sw"><div class="chip" style="background:#FDF6E3;color:#A8800B;">Highlight</div><div class="nm">Yellow 500</div><div class="hx">#F2B705</div></div>
    <div class="sw"><div class="chip" style="background:#FDEFE2;color:#E8852B;">Warning</div><div class="nm">Amber</div><div class="hx">#E8852B</div></div>
    <div class="sw"><div class="chip" style="background:#FBEAEA;color:#D64545;">Error</div><div class="nm">Red</div><div class="hx">#D64545</div></div>
  </div>
</div>
</body></html>
