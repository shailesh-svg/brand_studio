<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Logo Lockups" subtitle="Cobalt / white / black variants" viewport="700x200" --><html lang="en"><head><meta charset="utf-8">

<div class="card" style="gap:12px;">

    <div class="col3"><div class="lock" style="background:#fff;"><img src="../assets/logo-cobalt.png"></div><span class="hx">Primary · cobalt on white</span></div>
    <div class="col3"><div class="lock" style="background:#0A0E2A;border-color:transparent;"><img src="../assets/logo-white.png"></div><span class="hx">Inverse · white on dark</span></div>
    <div class="col3"><div class="lock" style="background:#fff;"><img src="../assets/logo-black.png"></div><span class="hx">Monochrome · black</span></div>
  </div>
</div>
