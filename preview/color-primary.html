<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Primary Color" subtitle="Cobalt signature + cyan + accent gradient" viewport="700x300" --><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_card.css">
<style>
  .sw{display:flex;flex-direction:column;gap:8px;}
  .chip{height:74px;border-radius:14px;border:1px solid rgba(14,19,32,.06);}
  .nm{font-size:13px;font-weight:500;color:var(--fg-1);}
  .hx{font-family:var(--font-mono);font-size:11px;color:var(--gray-400);}
  .grad{height:74px;border-radius:14px;}
</style>
</head><body>
<div class="card" style="gap:16px;">
  <div class="cap">Primary · cobalt signature</div>
  <div class="row" style="gap:16px;">
    <div class="sw" style="flex:1;"><div class="chip" style="background:#0047AB;"></div><div class="nm">Cobalt Blue</div><div class="hx">#0047AB</div></div>
    <div class="sw" style="flex:1;"><div class="chip" style="background:#003C90;"></div><div class="nm">Cobalt 700</div><div class="hx">#003C90 · hover</div></div>
    <div class="sw" style="flex:1;"><div class="chip" style="background:#00B8D9;"></div><div class="nm">Cyan</div><div class="hx">#00B8D9 · emphasis</div></div>
  </div>
  <div class="sw"><div class="grad" style="background:linear-gradient(90deg,#0047AB,#00B8D9);"></div><div class="hx">Accent gradient · #0047AB → #00B8D9 · hero text / motion only (rare)</div></div>
</div>
</body></html>
