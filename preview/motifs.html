<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Signature Motifs" subtitle="Data grid · circuit · chevron cue" viewport="700x240" --><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_card.css">
<style>
  .strip{position:relative;height:170px;border-radius:16px;overflow:hidden;background:#02020A;}
  .strip img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .tag{position:absolute;bottom:12px;left:14px;background:rgba(0,0,0,.4);backdrop-filter:blur(6px);color:#fff;font-size:11px;font-weight:500;padding:6px 12px;border-radius:9999px;}
  .chev{position:absolute;bottom:16px;right:18px;display:flex;color:#fff;opacity:.9;}
  .chev i{width:22px;height:22px;margin-left:-8px;stroke-width:1.5;}
</style>
</head><body>
<div class="card" style="gap:12px;">
  <div class="cap">Signature motifs · perspective data grid · circuit connector · chevron swipe cue</div>
  <div class="strip">
    <img src="../assets/carousel-bg.png" alt="grid motif">
    <span class="tag">Circuit connector (top-left) · grid floor · glowing horizon</span>
    <div class="chev"><i data-lucide="chevron-right"></i><i data-lucide="chevron-right"></i><i data-lucide="chevron-right"></i></div>
  </div>
</div>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>lucide.createIcons();</script>
</body></html>
