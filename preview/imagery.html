<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Dark Hero Imagery" subtitle="Full-bleed agentic backdrop" viewport="700x270" --><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_card.css">
<style>
  .hero{position:relative;height:200px;border-radius:16px;overflow:hidden;display:flex;align-items:center;padding:0 40px;background:#02020A;}
  .hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.9;}
  .htxt{position:relative;z-index:1;}
  .kick{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.16em;color:rgba(255,255,255,.6);margin-bottom:10px;}
  .hh{font-weight:200;font-size:32px;line-height:1.1;letter-spacing:-.02em;color:#fff;margin:0;}
  .hh b{font-weight:200;background:linear-gradient(90deg,#7EA8FF,#00B8D9);-webkit-background-clip:text;background-clip:text;color:transparent;}
</style>
</head><body>
<div class="card" style="gap:12px;">
  <div class="cap">Dark hero / social — full-bleed agentic backdrop</div>
  <div class="hero">
    <img src="../assets/carousel-bg.png" alt="">
    <div class="htxt">
      <div class="kick">Generative AI Experts</div>
      <p class="hh">Build Your <b>Agentic Enterprise.</b></p>
    </div>
  </div>
</div>
</body></html>
