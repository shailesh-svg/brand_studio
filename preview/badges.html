<!DOCTYPE html>
<!-- @dsCard group="Components" name="Badges & Chips" subtitle="Status badges + tag chips" viewport="700x220" --><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_card.css">
<style>
  .badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:500;padding:5px 12px;border-radius:9999px;}
  .dot{width:7px;height:7px;border-radius:50%;}
  .chip{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:400;padding:7px 14px;border-radius:9999px;background:var(--gray-50);border:1px solid var(--border);color:var(--gray-700);}
</style>
</head><body>
<div class="card" style="gap:18px;">
  <div class="cap">Status badges</div>
  <div class="row" style="gap:10px;">
    <span class="badge" style="background:#E6F6EF;color:#1FA971;"><span class="dot" style="background:#1FA971;"></span>In Production</span>
    <span class="badge" style="background:#FDF6E3;color:#A8800B;"><span class="dot" style="background:#F2B705;"></span>Integration</span>
    <span class="badge" style="background:#FDEFE2;color:#E8852B;"><span class="dot" style="background:#E8852B;"></span>Warning</span>
    <span class="badge" style="background:#FBEAEA;color:#D64545;"><span class="dot" style="background:#D64545;"></span>Error</span>
    <span class="badge" style="background:rgba(0,71,171,.08);color:#0047AB;"><span class="dot" style="background:#0047AB;"></span>Agent</span>
  </div>
  <div class="cap">Chips / tags</div>
  <div class="row" style="gap:10px;">
    <span class="chip">Agentic RAG</span>
    <span class="chip">ReAct</span>
    <span class="chip">Multi-Agent</span>
    <span class="chip">Observability</span>
  </div>
</div>
</body></html>
