<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Dark Surfaces" subtitle="Navy→cobalt agentic gradient" viewport="700x280" --><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_card.css">
<style>
  .sw{display:flex;flex-direction:column;gap:7px;}
  .chip{height:60px;border-radius:12px;border:1px solid rgba(255,255,255,.08);}
  .nm{font-size:12px;font-weight:500;color:#fff;}
  .hx{font-family:var(--font-mono);font-size:10px;color:rgba(255,255,255,.5);}
</style>
</head><body>
<div class="card dark" style="gap:14px;">
  <div class="cap" style="color:rgba(255,255,255,.5);">Agentic dark surfaces — navy → cobalt</div>
  <div class="row" style="gap:12px;">
    <div class="sw" style="flex:1;"><div class="chip" style="background:#02020A;"></div><div class="nm">Navy 950</div><div class="hx">#02020A</div></div>
    <div class="sw" style="flex:1;"><div class="chip" style="background:#111145;"></div><div class="nm">Navy 850</div><div class="hx">#111145</div></div>
    <div class="sw" style="flex:1;"><div class="chip" style="background:#1D2B74;"></div><div class="nm">Navy 700</div><div class="hx">#1D2B74</div></div>
    <div class="sw" style="flex:1;"><div class="chip" style="background:#202E86;"></div><div class="nm">Navy 600</div><div class="hx">#202E86</div></div>
    <div class="sw" style="flex:1;"><div class="chip" style="background:#2C2BAD;"></div><div class="nm">Navy 500</div><div class="hx">#2C2BAD</div></div>
  </div>
  <div class="sw"><div class="chip" style="height:42px;background:radial-gradient(120% 90% at 50% 120%,#2C2BAD,#1D2B74 32%,#111145 64%,#02020A 100%);"></div><div class="hx">--gradient-hero · used full-bleed for social / hero / booth</div></div>
</div>
</body></html>
