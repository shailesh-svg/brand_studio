<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Elevation" subtitle="Soft neutral shadows + cobalt CTA lift" viewport="700x220" --><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_card.css">
<style>
  .sw{display:flex;flex-direction:column;gap:10px;align-items:center;}
  .bx{width:96px;height:64px;border-radius:16px;background:#fff;}
  .lab{font-size:12px;font-weight:500;color:var(--fg-1);}
  .hx{font-family:var(--font-mono);font-size:10px;color:var(--gray-400);}
</style>
</head><body>
<div class="card" style="gap:18px;background:var(--gray-50);">
  <div class="cap">Elevation — soft, low, neutral (cobalt lift on CTAs)</div>
  <div class="row" style="gap:26px;align-items:flex-start;">
    <div class="sw"><div class="bx" style="box-shadow:0 1px 2px rgba(14,19,32,.05);"></div><div class="lab">xs</div><div class="hx">subtle</div></div>
    <div class="sw"><div class="bx" style="box-shadow:0 1px 3px rgba(14,19,32,.08),0 1px 2px rgba(14,19,32,.04);"></div><div class="lab">sm</div><div class="hx">card</div></div>
    <div class="sw"><div class="bx" style="box-shadow:0 6px 20px rgba(14,19,32,.08);"></div><div class="lab">md</div><div class="hx">raised</div></div>
    <div class="sw"><div class="bx" style="box-shadow:0 18px 48px rgba(14,19,32,.12);"></div><div class="lab">lg</div><div class="hx">overlay</div></div>
    <div class="sw"><div class="bx" style="box-shadow:0 12px 32px rgba(0,71,171,.22);"></div><div class="lab">cobalt</div><div class="hx">CTA</div></div>
  </div>
</div>
</body></html>
