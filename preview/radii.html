<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Corner Radius" subtitle="sm→3xl, full pill for buttons" viewport="700x210" --><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_card.css">
<style>
  .sw{display:flex;flex-direction:column;gap:8px;align-items:center;}
  .bx{width:84px;height:64px;background:var(--gray-50);border:1.5px solid var(--cobalt);}
  .lab{font-size:12px;font-weight:500;color:var(--fg-1);}
  .hx{font-family:var(--font-mono);font-size:10px;color:var(--gray-400);}
</style>
</head><body>
<div class="card" style="gap:16px;">
  <div class="cap">Corner radius</div>
  <div class="row" style="gap:20px;align-items:flex-start;">
    <div class="sw"><div class="bx" style="border-radius:8px;"></div><div class="lab">sm</div><div class="hx">8px</div></div>
    <div class="sw"><div class="bx" style="border-radius:12px;"></div><div class="lab">md</div><div class="hx">12px</div></div>
    <div class="sw"><div class="bx" style="border-radius:16px;"></div><div class="lab">lg</div><div class="hx">16px</div></div>
    <div class="sw"><div class="bx" style="border-radius:28px;"></div><div class="lab">3xl · cards</div><div class="hx">28px</div></div>
    <div class="sw"><div class="bx" style="border-radius:9999px;"></div><div class="lab">full · buttons</div><div class="hx">pill</div></div>
  </div>
</div>
</body></html>
